name: Repository validation

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: repository-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Static repository checks
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          persist-credentials: false
          show-progress: false

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends shellcheck

      - name: Validate POSIX syntax
        run: find scripts tests -type f -name '*.sh' -exec sh -n {} \;

      - name: Validate Python syntax
        run: |
          python3 - <<'PY'
          from pathlib import Path

          paths = sorted(Path('scripts').glob('*.py'))
          paths.extend(sorted(Path('tests/python').glob('test_*.py')))
          if not paths:
              raise SystemExit('no Python sources found')

          for path in paths:
              compile(path.read_text(encoding='utf-8'), str(path), 'exec')
              print(f'python syntax ok: {path}')
          PY

      - name: ShellCheck repository scripts
        run: shellcheck -s sh scripts/*.sh

      - name: ShellCheck contract tests
        run: shellcheck -s sh tests/shell/*.sh

      - name: Run shell contract tests
        run: |
          set -eu
          for test_script in tests/shell/*.sh; do
            sh "$test_script"
          done

      - name: Run Python unit tests
        run: python3 -m unittest discover -s tests/python -p 'test_*.py' -v

      - name: Validate repository policy
        env:
          SKIP_SHELLCHECK: '1'
        run: sh scripts/check-repository.sh

  arm64-build:
    name: Debian 13 ARM64 real build and boot
    needs: static
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.body, '<!-- run-arm64-build -->')
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      DEBIAN_CONTAINER_IMAGE: debian:trixie-20260623
      DEBIAN_SNAPSHOT: 20260718T000000Z
      SOURCE_DATE_EPOCH: '1784332800'
      IMAGE_SIZE: 4G

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          persist-credentials: false
          show-progress: false

      - name: Pull and record Debian build environment
        run: |
          set -eu
          mkdir -p build
          docker pull "$DEBIAN_CONTAINER_IMAGE"
          docker image inspect \
            --format '{{index .RepoDigests 0}}' \
            "$DEBIAN_CONTAINER_IMAGE" > build/container-image.txt
          cat build/container-image.txt

      - name: Build, boot, and inspect Debian ARM64
        run: |
          set -euo pipefail
          docker run --rm --privileged \
            --volume "$GITHUB_WORKSPACE:/workspace:ro" \
            --volume "$GITHUB_WORKSPACE/build:/workspace/build:rw" \
            --workdir /workspace \
            --env DEBIAN_CONTAINER_IMAGE \
            --env DEBIAN_SNAPSHOT \
            --env SOURCE_DATE_EPOCH \
            --env IMAGE_SIZE \
            --env BUILD_DIR=/workspace/build \
            --env OUTPUT_IMAGE=/workspace/build/morimil-trixie-arm64.raw \
            "$DEBIAN_CONTAINER_IMAGE" \
            sh -c 'sh scripts/ci-build-arm64.sh && sh scripts/ci-inspect-ext4.sh' \
            2>&1 | tee build/ci.log

      - name: Prepare evidence permissions
        if: always()
        run: |
          set -eu
          if [ -d build ]; then
            sudo find build \
              -maxdepth 1 \
              -type f \
              ! -name '*.raw' \
              -exec chmod 0644 {} +
          fi

      - name: Upload build evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morimil-arm64-validation-${{ github.run_id }}
          path: |
            build/ci.log
            build/build.log
            build/boot.log
            build/container-image.txt
            build/environment.txt
            build/ext4-groups.txt
            build/ext4-inspection-environment.txt
            build/ext4-inspection-status.txt
            build/ext4-superblock.txt
            build/ext4-tree.jsonl
            build/ext4-tree.sha256
            build/guest-apt-sources.sources
            build/guest-apt-sources.sha256
            build/image-regions.txt
            build/mmdebstrap-helper-preflight.txt
            build/mmdebstrap-helper.sha256
            build/morimil-trixie-arm64.raw.identifiers
            build/morimil-trixie-arm64.raw.metadata
            build/morimil-trixie-arm64.raw.sha256
            build/validation-status.txt
          if-no-files-found: warn
          retention-days: 7

  arch-rootfs-discovery:
    name: Inspect signed Arch Linux ARM rootfs release
    needs: static
    if: >-
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.body, '<!-- run-arch-rootfs-discovery -->')
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          persist-credentials: false
          show-progress: false

      - name: Install release inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            ca-certificates \
            curl \
            dirmngr \
            gnupg \
            libarchive-tools

      - name: Inspect official signed AArch64 rootfs
        env:
          ARCH_ROOTFS_EVIDENCE_DIR: ${{ github.workspace }}/build/arch-rootfs-release
        run: sh scripts/inspect-arch-rootfs-release.sh

      - name: Validate release evidence
        run: sh scripts/check-arch-rootfs-release-evidence.sh build/arch-rootfs-release

      - name: Prepare release evidence permissions
        if: always()
        run: |
          set -eu
          if [ -d build/arch-rootfs-release ]; then
            chmod 0755 build/arch-rootfs-release
            find build/arch-rootfs-release -maxdepth 1 -type f -exec chmod 0644 {} +
          fi

      - name: Upload Arch rootfs release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morimil-arch-rootfs-release-${{ github.run_id }}
          path: build/arch-rootfs-release/
          if-no-files-found: warn
          retention-days: 7

  arch-rootfs-bootstrap:
    name: Bootstrap pinned Arch Linux ARM rootfs
    needs: static
    if: >-
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.body, '<!-- run-arch-rootfs-bootstrap -->')
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          persist-credentials: false
          show-progress: false

      - name: Install rootfs bootstrap tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            binutils \
            ca-certificates \
            curl \
            file \
            gnupg \
            gpgv \
            libarchive-tools

      - name: Download, verify, publish, inspect, and remove rootfs
        run: |
          sudo env \
            BUILD_DIR="$GITHUB_WORKSPACE/build/arch-rootfs-bootstrap" \
            ARCH_ROOTFS_PIN_FILE="$GITHUB_WORKSPACE/config/arch-rootfs-release.env" \
            ARCH_ROOTFS_KEY_FILE="$GITHUB_WORKSPACE/config/keys/archlinuxarm-build-system.asc" \
            sh scripts/ci-bootstrap-arch-rootfs.sh

      - name: Prepare bootstrap evidence permissions
        if: always()
        run: |
          set -eu
          evidence=build/arch-rootfs-bootstrap/evidence
          if [ -d "$evidence" ]; then
            sudo chown -R "$(id -u):$(id -g)" "$evidence"
            chmod 0755 "$evidence"
            find "$evidence" -maxdepth 1 -type f -exec chmod 0644 {} +
          fi

      - name: Upload Arch rootfs bootstrap evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morimil-arch-rootfs-bootstrap-${{ github.run_id }}
          path: build/arch-rootfs-bootstrap/evidence/
          if-no-files-found: warn
          retention-days: 7

  arch-executor-runtime:
    name: Boot isolated Arch executor on native ARM64
    needs: static
    if: >-
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.body, '<!-- run-arch-executor-runtime -->')
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          persist-credentials: false
          show-progress: false

      - name: Install native runtime validation tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            binutils \
            ca-certificates \
            curl \
            file \
            gnupg \
            gpgv \
            libarchive-tools \
            systemd-container \
            util-linux

      - name: Bootstrap, boot, fail, rebuild, and remove executor
        run: |
          sudo env \
            BUILD_DIR="$GITHUB_WORKSPACE/build/arch-executor-runtime" \
            ARCH_ROOTFS_PIN_FILE="$GITHUB_WORKSPACE/config/arch-rootfs-release.env" \
            ARCH_ROOTFS_KEY_FILE="$GITHUB_WORKSPACE/config/keys/archlinuxarm-build-system.asc" \
            ARCH_EXECUTOR_POLICY_FILE="$GITHUB_WORKSPACE/config/nspawn/morimil-arch.nspawn" \
            sh scripts/ci-validate-arch-executor-runtime.sh

      - name: Prepare runtime evidence permissions
        if: always()
        run: |
          set -eu
          evidence=build/arch-executor-runtime/evidence
          if [ -d "$evidence" ]; then
            sudo chown -R "$(id -u):$(id -g)" "$evidence"
            chmod 0755 "$evidence"
            find "$evidence" -maxdepth 1 -type f -exec chmod 0644 {} +
          fi
          if [ -f arch-executor-runtime-status.txt ]; then
            sudo chown "$(id -u):$(id -g)" arch-executor-runtime-status.txt
            chmod 0644 arch-executor-runtime-status.txt
          fi

      - name: Upload Arch executor runtime evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morimil-arch-executor-runtime-${{ github.run_id }}
          path: |
            build/arch-executor-runtime/evidence/
            arch-executor-runtime-status.txt
          if-no-files-found: warn
          retention-days: 7
