name: Lifecycle ShellCheck diagnostic

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          show-progress: false
      - run: |
          sudo apt-get update >/dev/null
          sudo apt-get install --yes --no-install-recommends shellcheck >/dev/null
      - name: Capture ShellCheck report
        run: |
          set +e
          shellcheck -f gcc -s sh \
            scripts/check-arch-executor-lifecycle-evidence.sh \
            scripts/ci-validate-arch-executor-lifecycle.sh \
            scripts/morimil-arch-executor.sh \
            scripts/prepare-arch-executor-rootfs.sh \
            tests/shell/test-arch-executor-lifecycle-evidence.sh \
            tests/shell/test-arch-executor-lifecycle.sh \
            > lifecycle-shellcheck-report.txt 2>&1
          status=$?
          printf '%s\n' "$status" > lifecycle-shellcheck-status.txt
          exit "$status"
      - name: Upload ShellCheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lifecycle-shellcheck-${{ github.run_id }}
          path: |
            lifecycle-shellcheck-report.txt
            lifecycle-shellcheck-status.txt
          if-no-files-found: error
          retention-days: 1
